name: pytensor_ml
channels:
  - conda-forge
  - nodefaults

dependencies:
  - python>=3.12
  - pytensor>=3.0.0,<4.0.0
  - numpy
  - safetensors
  - scikit-learn

  # For testing
  - coveralls
  - diff-cover
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-benchmark
  - pytest-mock

  # For building docs
  - sphinx
  - sphinx_rtd_theme
  - pygments
  - pydot
  - ipython

  # developer tools
  - pre-commit
  - mypy

  # JAX backend for dispatch tests; via pip so Windows pulls CPU wheels instead of conda jaxlib
  - pip
  - pip:
      - jax
